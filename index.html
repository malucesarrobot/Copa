
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Álbum de Figurinhas</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4}
header{background:#1565c0;color:#fff;padding:16px;text-align:center;position:sticky;top:0}
#search{width:95%;padding:10px;margin:10px auto;display:block;font-size:16px}
.card{background:#fff;margin:10px;border-radius:10px;padding:10px}
h2{margin:0 0 8px;color:#1565c0}
.item{padding:8px;border-radius:6px;cursor:pointer}
.item.done{text-decoration:line-through;color:#777;background:#e8f5e9}
small{display:block}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

// COLE AQUI SUA CONFIG DO FIREBASE
const firebaseConfig={
apiKey:"",
authDomain:"",
databaseURL:"",
projectId:"",
storageBucket:"",
messagingSenderId:"",
appId:""
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const ROOM="MALU-COPA";

const data={
ARG:[2,3,11],
AUS:[3,8],
BEL:[12,20],
BIH:[13,19,20],
BRA:[2],
CAN:[11],
COD:[5,8,8,11,12,12,14,17,20],
COL:[3,5,5,7,11,11,16,16,17],
CPV:[15,18,19],
CRO:[13,14],
CWU:[1,6,8,15],
CZE:[18,19],
CIV:[13,18],
ECU:[11],
EGY:[18],
ENG:[13,16],
ESP:[2],
FRA:[17,20],
FWC:[7],
GER:[2,5],
GHA:[7],
HAI:[13,13],
IRN:[7,12,12,13],
IRQ:[1,8,11,16,18],
JPN:[17],
KOR:[2,6,14],
MAR:[7,9],
MEX:[4,18],
NOR:[13],
NZL:[14],
PAR:[5,8],
POR:[12,12],
QAT:[5],
SCO:[14,18,18],
SUI:[6,13,13,18,18],
SWE:[9,14,18,19],
TUN:[5,7,8,9,13,13,20],
TUR:[1,1,2,3,4,5],
URU:[4],
USA:[7],
UZB:[4,4,13,14]
};

let state={};

function key(p,n,i){return p+"-"+n+"-"+i;}

function render(){
 const c=document.getElementById("list");
 const s=document.getElementById("search").value.toUpperCase();
 c.innerHTML="";
 let total=0,done=0;
 Object.keys(data).sort().forEach(p=>{
   if(s && !p.includes(s) && !data[p].some(n=>String(n).includes(s))) return;
   let html=`<div class='card'><h2>${p}</h2>`;
   data[p].forEach((n,i)=>{
      total++;
      const k=key(p,n,i);
      const d=!!state[k];
      if(d) done++;
      html+=`<div class='item ${d?"done":""}' onclick="toggle('${k}')">${d?"✔":"☐"} ${n}</div>`;
   });
   html+="</div>";
   c.innerHTML+=html;
 });
 document.getElementById("prog").textContent=`${done}/${total} conseguidas`;
}
window.toggle=function(k){
 state[k]=!state[k];
 set(ref(db,"albums/"+ROOM+"/"+k),state[k]);
}
onValue(ref(db,"albums/"+ROOM),snap=>{
 state=snap.val()||{};
 render();
});
window.addEventListener("input",render);
</script>
</head>
<body>
<header>
<h1>Álbum de Figurinhas</h1>
<small id="prog">0/0</small>
</header>
<input id="search" placeholder="Pesquisar país ou número">
<div id="list"></div>
</body>
</html>
